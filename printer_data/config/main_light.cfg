#####################################################################
# 1. 하드웨어 핀 설정 (부팅 시 눈뽕 방지)
#####################################################################
[output_pin main_light]
pin: mcu_z:PB15
pwm: True
cycle_time: 0.010
value: 1.0              # 부팅 직후 1.0(어두움/꺼짐) 상태 유지
shutdown_value: 1.0     # 비상시에도 조명 끔

#####################################################################
# 2. 숨쉬기(Breathing) 제어 - 핑퐁 루프 방식 (G4 제거)
#####################################################################
[gcode_macro BREATH_LIGHT]
variable_breathing: 0
gcode:
    {% set val = params.VAL|default(0)|int %}
    SET_GCODE_VARIABLE MACRO=BREATH_LIGHT VARIABLE=breathing VALUE={val}
    {% if val == 1 %}
        # 숨쉬기 시작 (즉시 실행)
        UPDATE_DELAYED_GCODE ID=_BREATH_STEP_BRIGHT DURATION=0.1
    {% else %}
        # 모든 숨쉬기 루프 강제 정지 및 소등
        UPDATE_DELAYED_GCODE ID=_BREATH_STEP_BRIGHT DURATION=0
        UPDATE_DELAYED_GCODE ID=_BREATH_STEP_DIM DURATION=0
        SET_PIN PIN=main_light VALUE=1.0 FADETIME=1.5
    {% endif %}

# [루프 A] 서서히 밝아지기 (1.0 -> 0.1)
[delayed_gcode _BREATH_STEP_BRIGHT]
gcode:
    {% if printer["gcode_macro BREATH_LIGHT"].breathing == 1 %}
        # 0.0까지 가면 너무 눈부실 수 있어 0.1(약 90% 밝기)로 설정
        SET_PIN PIN=main_light VALUE=0.1 FADETIME=3.0
        UPDATE_DELAYED_GCODE ID=_BREATH_STEP_DIM DURATION=3.0
    {% endif %}

# [루프 B] 서서히 어두워지기 (0.1 -> 1.0)
[delayed_gcode _BREATH_STEP_DIM]
gcode:
    {% if printer["gcode_macro BREATH_LIGHT"].breathing == 1 %}
        SET_PIN PIN=main_light VALUE=1.0 FADETIME=3.0
        UPDATE_DELAYED_GCODE ID=_BREATH_STEP_BRIGHT DURATION=3.0
    {% endif %}

#####################################################################
# 3. 상태별 조명 연동 매크로
#####################################################################

[gcode_macro STATUS_READY]
rename_existing: _STATUS_READY_BASE
gcode:
    _STATUS_READY_BASE
    BREATH_LIGHT VAL=1           # 대기 중엔 다시 숨쉬기

[gcode_macro STATUS_OFF]
rename_existing: _STATUS_OFF_BASE
gcode:
    _STATUS_OFF_BASE
    BREATH_LIGHT VAL=0           # 조명 완전히 끄기

[gcode_macro STATUS_HEATING]
rename_existing: _STATUS_HEATING_BASE
gcode:
    _STATUS_HEATING_BASE
    BREATH_LIGHT VAL=0           # 숨쉬기 끄고
    SET_PIN PIN=main_light VALUE=0.0  # 히팅 중엔 100% 풀파워(반전로직)

[gcode_macro STATUS_HOMING]
rename_existing: _STATUS_HOMING_BASE
gcode:
    _STATUS_HOMING_BASE
    BREATH_LIGHT VAL=0
    SET_PIN PIN=main_light VALUE=0.5  # 홈잉 중엔 50% 밝기

[gcode_macro STATUS_PRINTING]
rename_existing: _STATUS_PRINTING_BASE
gcode:
    _STATUS_PRINTING_BASE
    BREATH_LIGHT VAL=0
    SET_PIN PIN=main_light VALUE=0.0  # 출력 중엔 100% 밝기

################################