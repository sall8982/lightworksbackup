#####################################################################
# 1. 하드웨어 핀 설정 (부팅 시 눈뽕 방지 세팅)
#####################################################################
[output_pin main_light]
pin: mcu_z:PB15
pwm: True
cycle_time: 0.010
value: 1.0              # 1.0이 꺼짐(또는 최소)이라 부팅 시 얌전함
shutdown_value: 1.0     # 꺼질 때도 눈 안 아프게!

#####################################################################
# 2. 숨쉬기(Breathing) 제어 - 반전 로직 버전
#####################################################################
[gcode_macro BREATH_LIGHT]
variable_breathing: 0
gcode:
    {% set val = params.VAL|default(0)|int %}
    SET_GCODE_VARIABLE MACRO=BREATH_LIGHT VARIABLE=breathing VALUE={val}
    {% if val == 1 %}
        UPDATE_DELAYED_GCODE ID=_BREATH_LOOP_ON DURATION=0.1
    {% else %}
        UPDATE_DELAYED_GCODE ID=_BREATH_LOOP_ON DURATION=0
        UPDATE_DELAYED_GCODE ID=_BREATH_LOOP_OFF DURATION=0
        SET_PIN PIN=main_light VALUE=1.0 FADETIME=1.5 # 끄기
    {% endif %}

# 숨쉬기 루프: 밝아지기 (Value 1.0 -> 0.0)
[delayed_gcode _BREATH_LOOP_ON]
gcode:
    SET_PIN PIN=main_light VALUE=0.0 FADETIME=2.5
    UPDATE_DELAYED_GCODE ID=_BREATH_LOOP_OFF DURATION=2.5

# 숨쉬기 루프: 흐려지기 (Value 0.0 -> 1.0)
[delayed_gcode _BREATH_LOOP_OFF]
gcode:
    {% if printer["gcode_macro BREATH_LIGHT"].breathing == 1 %}
        SET_PIN PIN=main_light VALUE=1.0 FADETIME=2.5
        UPDATE_DELAYED_GCODE ID=_BREATH_LOOP_ON DURATION=2.5
    {% endif %}

#####################################################################
# 3. 상태별 조명 연동 매크로 (루프 강제 시작/종료 포함)
#####################################################################

[gcode_macro STATUS_READY]
rename_existing: _STATUS_READY_BASE
gcode:
    _STATUS_READY_BASE
    UPDATE_DELAYED_GCODE ID=_HEATING_ALARM_LOOP DURATION=0
    UPDATE_DELAYED_GCODE ID=_WORKING_LIGHT_LOOP DURATION=0
    BREATH_LIGHT VAL=1           # 대기 시 숨쉬기 시작

[gcode_macro STATUS_OFF]
rename_existing: _STATUS_OFF_BASE
gcode:
    _STATUS_OFF_BASE
    BREATH_LIGHT VAL=0
    UPDATE_DELAYED_GCODE ID=_HEATING_ALARM_LOOP DURATION=0
    UPDATE_DELAYED_GCODE ID=_WORKING_LIGHT_LOOP DURATION=0
    SET_PIN PIN=main_light VALUE=1.0 FADETIME=1.5 # 완전 소등

[gcode_macro STATUS_HEATING]
rename_existing: _STATUS_HEATING_BASE
gcode:
    _STATUS_HEATING_BASE
    BREATH_LIGHT VAL=0
    UPDATE_DELAYED_GCODE ID=_WORKING_LIGHT_LOOP DURATION=0
    UPDATE_DELAYED_GCODE ID=_HEATING_ALARM_LOOP DURATION=0.1 # 히팅 알람 시작

[gcode_macro STATUS_HOMING]
rename_existing: _STATUS_HOMING_BASE
gcode:
    _STATUS_HOMING_BASE
    BREATH_LIGHT VAL=0
    UPDATE_DELAYED_GCODE ID=_HEATING_ALARM_LOOP DURATION=0
    SET_PIN PIN=main_light VALUE=0.5  # 홈잉 시 50% 고정 (반전이라도 0.5는 중간!)
    # 필요하면 UPDATE_DELAYED_GCODE ID=_WORKING_LIGHT_LOOP DURATION=0.1 로 변경 가능

[gcode_macro STATUS_LEVELING]
rename_existing: _STATUS_LEVELING_BASE
gcode:
    _STATUS_LEVELING_BASE
    BREATH_LIGHT VAL=0
    SET_PIN PIN=main_light VALUE=0.7  # 약간 흐리게 고정

[gcode_macro STATUS_PRINTING]
rename_existing: _STATUS_PRINTING_BASE
gcode:
    _STATUS_PRINTING_BASE
    BREATH_LIGHT VAL=0
    UPDATE_DELAYED_GCODE ID=_HEATING_ALARM_LOOP DURATION=0
    UPDATE_DELAYED_GCODE ID=_WORKING_LIGHT_LOOP DURATION=0
    SET_PIN PIN=main_light VALUE=0.0  # 출력 중 100% (반전 로직)

#####################################################################
# 4. 루프 함수 (토글 방식)
#####################################################################

# [히팅 비상등: 0.0 <-> 1.0 깜빡이]
[delayed_gcode _HEATING_ALARM_LOOP]
gcode:
    {% if printer["output_pin main_light"].value < 0.5 %}
        SET_PIN PIN=main_light VALUE=1.0
    {% else %}
        SET_PIN PIN=main_light VALUE=0.0
    {% endif %}
    UPDATE_DELAYED_GCODE ID=_HEATING_ALARM_LOOP DURATION=0.5

# [작업중 조명: 서서히 깜빡]
[delayed_gcode _WORKING_LIGHT_LOOP]
gcode:
    {% if printer["output_pin main_light"].value < 0.5 %}
        SET_PIN PIN=main_light VALUE=1.0 FADETIME=0.8
    {% else %}
        SET_PIN PIN=main_light VALUE=0.3 FADETIME=0.8
    {% endif %}
    UPDATE_DELAYED_GCODE ID=_WORKING_LIGHT_LOOP DURATION=1.0