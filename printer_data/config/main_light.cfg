#####################################################################
# 1. 하드웨어 핀 설정 (부팅 시 흐리게)
#####################################################################
[output_pin main_light]
pin: mcu_z:PB15
pwm: True
cycle_time: 0.010
value: 1.0              
shutdown_value: 1.0     

#####################################################################
# 2. 강제 숨쉬기 루프 (조건문 최소화)
#####################################################################
[gcode_macro BREATH_LIGHT_START]
gcode:
    UPDATE_DELAYED_GCODE ID=_LOOP_BRIGHT DURATION=0.1

[gcode_macro BREATH_LIGHT_STOP]
gcode:
    UPDATE_DELAYED_GCODE ID=_LOOP_BRIGHT DURATION=0
    UPDATE_DELAYED_GCODE ID=_LOOP_DIM DURATION=0
    SET_PIN PIN=main_light VALUE=1.0 FADETIME=1.5

# 루프 A: 밝아지기
[delayed_gcode _LOOP_BRIGHT]
gcode:
    SET_PIN PIN=main_light VALUE=0.0 FADETIME=3.0
    UPDATE_DELAYED_GCODE ID=_LOOP_DIM DURATION=3.0

# 루프 B: 어두워지기
[delayed_gcode _LOOP_DIM]
gcode:
    SET_PIN PIN=main_light VALUE=1.0 FADETIME=3.0
    UPDATE_DELAYED_GCODE ID=_LOOP_BRIGHT DURATION=3.0

#####################################################################
# 3. 부팅 후 자동 실행
#####################################################################
[delayed_gcode _WELCOME]
initial_duration: 3.0   # 부팅 3초 뒤에 강제로 루프 시작!
gcode:
    BREATH_LIGHT_START