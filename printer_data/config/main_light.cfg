#####################################################################
# 1. 하드웨어 핀 설정 (부팅 시 흐리게)
#####################################################################
[output_pin main_light]
pin: mcu_z:PB15
pwm: True
cycle_time: 0.010
value: 1.0              # 부팅 시 어두운 상태 유지
shutdown_value: 1.0

#####################################################################
# 2. 부드러운 단계별 숨쉬기 매크로 (FADETIME 미사용 버전)
#####################################################################
[gcode_macro BREATH_LIGHT]
variable_running: 0      # 숨쉬기 동작 여부
variable_level: 1.0      # 현재 밝기 값 (1.0에서 시작)
variable_direction: -1   # -1: 밝아지는 중, 1: 어두워지는 중
gcode:
    {% set val = params.VAL|default(0)|int %}
    SET_GCODE_VARIABLE MACRO=BREATH_LIGHT VARIABLE=running VALUE={val}
    {% if val == 1 %}
        UPDATE_DELAYED_GCODE ID=_BREATH_TICK DURATION=0.1
    {% else %}
        UPDATE_DELAYED_GCODE ID=_BREATH_TICK DURATION=0
        SET_PIN PIN=main_light VALUE=1.0  # 끄기
    {% endif %}

[delayed_gcode _BREATH_TICK]
gcode:
    {% set macro = printer["gcode_macro BREATH_LIGHT"] %}
    {% if macro.running == 1 %}
        {% set cur_level = macro.level|float %}
        {% set dir = macro.direction|int %}
        
        # 0.04씩 변화 (이 숫자가 작을수록 더 천천히, 더 부드럽게 변함)
        {% set next_level = cur_level + (dir * 0.04) %}
        
        # 경계값 처리 및 방향 전환
        {% if next_level <= 0.1 %}
            {% set next_level = 0.1 %}
            {% set dir = 1 %}
        {% elif next_level >= 1.0 %}
            {% set next_level = 1.0 %}
            {% set dir = -1 %}
        {% endif %}
        
        # 변수 저장 및 실제 핀 제어
        SET_GCODE_VARIABLE MACRO=BREATH_LIGHT VARIABLE=level VALUE={next_level}
        SET_GCODE_VARIABLE MACRO=BREATH_LIGHT VARIABLE=direction VALUE={dir}
        SET_PIN PIN=main_light VALUE={next_level}
        
        # 0.1초 뒤에 다시 실행 (매우 부드러운 주사율)
        UPDATE_DELAYED_GCODE ID=_BREATH_TICK DURATION=0.1
    {% endif %}

#####################################################################
# 3. 상태별 연동 (기존 매크로와 조화)
#####################################################################
[gcode_macro STATUS_READY]
rename_existing: _STATUS_READY_BASE
gcode:
    _STATUS_READY_BASE
    BREATH_LIGHT VAL=1

[gcode_macro STATUS_HEATING]
rename_existing: _STATUS_HEATING_BASE
gcode:
    _STATUS_HEATING_BASE
    BREATH_LIGHT VAL=0
    SET_PIN PIN=main_light VALUE=0.0  # 히팅 중엔 즉시 100% 풀파워

[gcode_macro STATUS_PRINTING]
rename_existing: _STATUS_PRINTING_BASE
gcode:
    _STATUS_PRINTING_BASE
    BREATH_LIGHT VAL=0
    SET_PIN PIN=main_light VALUE=0.0  # 출력 중에도 100%

[gcode_macro STATUS_OFF]
rename_existing: _STATUS_OFF_BASE
gcode:
    _STATUS_OFF_BASE
    BREATH_LIGHT VAL=0

#####################################################################
# 4. 부팅 완료 후 자동 시작
#####################################################################
[delayed_gcode _WELCOME_START]
initial_duration: 2.0
gcode:
    BREATH_LIGHT VAL=1