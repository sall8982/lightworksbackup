#####################################################################
# 1. 하드웨어 및 숨쉬기 엔진 (범위 조절 기능 추가)
#####################################################################
[output_pin main_light]
pin: mcu_z:PB15
pwm: True
cycle_time: 0.010
value: 1.0
shutdown_value: 1.0

[gcode_macro BREATH_LIGHT]
variable_running: 0
variable_level: 1.0
variable_direction: -1
variable_min_val: 0.1    # 숨쉬기 최저값 (0.1이 밝음)
variable_max_val: 1.0    # 숨쉬기 최고값 (1.0이 어두움)
gcode:
    {% set val = params.VAL|default(0)|int %}
    {% set min_v = params.MIN|default(0.1)|float %}
    {% set max_v = params.MAX|default(1.0)|float %}
    
    SET_GCODE_VARIABLE MACRO=BREATH_LIGHT VARIABLE=running VALUE={val}
    SET_GCODE_VARIABLE MACRO=BREATH_LIGHT VARIABLE=min_val VALUE={min_v}
    SET_GCODE_VARIABLE MACRO=BREATH_LIGHT VARIABLE=max_val VALUE={max_v}
    
    {% if val == 1 %}
        UPDATE_DELAYED_GCODE ID=_BREATH_TICK DURATION=0.1
    {% else %}
        UPDATE_DELAYED_GCODE ID=_BREATH_TICK DURATION=0
    {% endif %}

[delayed_gcode _BREATH_TICK]
gcode:
    {% set macro = printer["gcode_macro BREATH_LIGHT"] %}
    {% if macro.running == 1 %}
        {% set cur_level = macro.level|float %}
        {% set dir = macro.direction|int %}
        {% set next_level = cur_level + (dir * 0.04) %}
        
        # 설정된 MIN/MAX 범위 내에서만 움직임
        {% if next_level <= macro.min_val %}
            {% set next_level = macro.min_val %}
            {% set dir = 1 %}
        {% elif next_level >= macro.max_val %}
            {% set next_level = macro.max_val %}
            {% set dir = -1 %}
        {% endif %}
        
        SET_GCODE_VARIABLE MACRO=BREATH_LIGHT VARIABLE=level VALUE={next_level}
        SET_GCODE_VARIABLE MACRO=BREATH_LIGHT VARIABLE=direction VALUE={dir}
        SET_PIN PIN=main_light VALUE={next_level}
        UPDATE_DELAYED_GCODE ID=_BREATH_TICK DURATION=0.1
    {% endif %}

#####################################################################
# 2. 오빠의 커스텀 시나리오 적용
#####################################################################

# [출력 종료 / 대기] 50% 밝기 근처에서 은은하게 숨쉬기!
[gcode_macro STATUS_READY]
rename_existing: _STATUS_READY_BASE
gcode:
    _STATUS_READY_BASE
    # MIN=0.5(50% 밝기)에서 MAX=1.0(꺼짐) 사이로만 숨쉬기
    BREATH_LIGHT VAL=1 MIN=0.2 MAX=1.0

# [히팅 중] 전체 범위(풀파워)로 숨쉬기
[gcode_macro STATUS_HEATING]
rename_existing: _STATUS_HEATING_BASE
gcode:
    _STATUS_HEATING_BASE
    BREATH_LIGHT VAL=1 MIN=0.2 MAX=1.0

# [홈잉 / 프린팅 / 레벨링] 숨쉬기 멈추고 풀파워 고정!
[gcode_macro STATUS_HOMING]
rename_existing: _STATUS_HOMING_BASE
gcode:
    _STATUS_HOMING_BASE
    BREATH_LIGHT VAL=0
    SET_PIN PIN=main_light VALUE=0.0

[gcode_macro STATUS_LEVELING]
rename_existing: _STATUS_LEVELING_BASE
gcode:
    _STATUS_LEVELING_BASE
    BREATH_LIGHT VAL=0
    SET_PIN PIN=main_light VALUE=0.0

[gcode_macro STATUS_PRINTING]
rename_existing: _STATUS_PRINTING_BASE
gcode:
    _STATUS_PRINTING_BASE
    BREATH_LIGHT VAL=0
    SET_PIN PIN=main_light VALUE=0.0

#####################################################################
# 3. 부팅 시 시동
#####################################################################
[delayed_gcode _WELCOME_START]
initial_duration: 2.0
gcode:
    # 처음 부팅했을 때도 은은하게 숨쉬기로 시작
    STATUS_READY