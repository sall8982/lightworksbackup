[gcode_macro CARTOGRAPHER_TOUCH_v2]
description = "Touch probe calibration with automatic Z offset application and feedback"
gcode =
    {% if printer.toolhead.homed_axes == "xyz" %}
    PROBE
    {% set z_offset = printer.probe.z_offset|default(0.0) %}
    SET_GCODE_OFFSET Z={z_offset}
    RESPOND MSG="Z-offset calibrated: {z_offset}"
    {% else %}
    RESPOND TYPE=error MSG="Printer axes not homed. Please home XYZ before calibration."
    {% endif %}






[gcode_macro G32]
gcode:
    G90 
    BED_MESH_CLEAR
    NEOPIXEL_DISPLAY LED="my_led" TYPE=extruder_temp MODE=glow
    STOP_LED_EFFECTS
    STATUS_HOMING
    clean_nozzle
    G28
    STOP_LED_EFFECTS
    STATUS_LEVELING
    STATUS_READY
    SET_DISPLAY_TEXT MSG="QGL"
    QUAD_GANTRY_LEVEL
   # CALIBRATE_Z    ##   auto z 사용시 명령어
    STOP_LED_EFFECTS
    STATUS_MESHING
    SET_DISPLAY_TEXT MSG="BED MESH"
    ADAPTIVE_BED_MESH_CALIBRATE
    clean_nozzle
    SET_DISPLAY_TEXT MSG="CARTOGRAPHER_TOUCH "
    CARTOGRAPHER_TOUCH 
    BED_MESH_PROFILE SAVE=default
    BED_MESH_PROFILE LOAD=default
    STOP_LED_EFFECTS
    STATUS_READY
   
#####################################################################
[gcode_macro M205]
gcode:
 G4
#####################################################################
[delayed_gcode _INIT_TIMELAPSE_CHECK_TIME]
initial_duration: 1
gcode: SET_GCODE_VARIABLE MACRO=TIMELAPSE_TAKE_FRAME VARIABLE=check_time VALUE=0.5 

##########################################################################################################################################  
#   Use  print_start for the slicer ending script - please customise for your slicer of choice
##########################################################################################################################################
[gcode_macro print_start]
gcode:
        SET_GCODE_VARIABLE MACRO=TIMELAPSE_TAKE_FRAME VARIABLE=check_time VALUE=0.5 
    G28 
    STOP_LED_EFFECTS
    STATUS_READY
    STOP_LED_EFFECTS
    STATUS_HOMING
    #SET_GCODE_OFFSET Z=0 
    G28 Z                             ; Home all axes
    G90                               ; 절대값 이동선언
    SET_DISPLAY_TEXT MSG="Heating Bed: {target_bed}°C"   
    STOP_LED_EFFECTS
    STATUS_LEVELING
    clean_nozzle
    SET_DISPLAY_TEXT MSG="Leveling..." 
    QUAD_GANTRY_LEVEL                  ### QUAD_GANTRY_LEVEL ####
    G28 Z
    STOP_LED_EFFECTS
    STATUS_HOMING
    STOP_LED_EFFECTS
    STATUS_MESHING                       
    clean_nozzle
    BED_MESH_CLEAR
    #BED_MESH_PROFILE LOAD=default        #### 베드메쉬 로드해서 사용할때 이줄만 활성화  나머진 ## 처리####
    SET_DISPLAY_TEXT MSG="Bed Mesh Calibration" 
    ADAPTIVE_BED_MESH_CALIBRATE                   ### BED_MESH_CALIBRATE ####
    STOP_LED_EFFECTS
    STATUS_LEVELING
    clean_nozzle
    SET_DISPLAY_TEXT MSG="Calibrating Z Offset"    
    CARTOGRAPHER_TOUCH                   ### CARTOGRAPHER_TOUCH LEVELing ####
    #clean_nozzle
    STOP_LED_EFFECTS 
    STATUS_PRINTING
    G91 E0.0
    G90                               # 지우지말것!
    G1 Z10 F3000                      ; move nozzle away from bed
    G1 X10.2 Y20 Z5.0 F3500.0         ; Move to start position
    G1 Z3.0 F3500
    M221 S100
    G1 X10.2 Y450.0 Z0.4 F3500.0 E25  ; Draw the first line
    G1 X15.0 Y450.0 Z0.4 F3500.0      ; Move to side a little
    G1 X15.0 Y20 Z0.4 F3500.0 E30     ; Draw the second line
    G91 E0.0                          ; Reset Extruder
    G1 Z5 F3500                       ; Move Z Axis up
    NEOPIXEL_DISPLAY LED="my_led" TYPE=print_percent MODE=progress
    G90                               # Switch back to absolute positioning   퍼지후 센터에서 출력시작 (지우지말것!)


##########################################################################################################################################   
#   Use PRINT_END for the slicer ending script - please customise for your slicer of choice
##########################################################################################################################################
[gcode_macro print_end]
gcode:
    STOP_LED_EFFECTS 
    STATUS_BUSY
    M400                           ; wait for buffer to clear
    G91                            ; relative positioning
    G92 E0                         ; zero the extruder
    G1 X-2 Y-2 E-3 F300            ; retract filament  
    G0 Z1.00 X20.0 Y20.0 F20000    ; move nozzle to remove stringing
    TURN_OFF_HEATERS
    G1 Z5 F3000                    ; move nozzle up 5mm
    G90                            ; absolute positioning
    G0 X720 Y485 F3600            ; park nozzle at rear
    BED_MESH_CLEAR
    STOP_LED_EFFECTS 
    STATUS_READY
    M104 S0                        ;T핫엔드 끄기
    M140 S0                        ;베드 끄기 
    STOP_LED_EFFECTS 
    STATUS_READY
    G4 S600                        ; 10분 대기 
    M106 S0                        ; turn off fan 
    M84 XYE                           ; Z를 제외한 모든 스테퍼 비활성화
    M81
    STOP_LED_EFFECTS 
    STATUS_OFF


#########################################################################################################################################
[idle_timeout]
gcode:
   TURN_OFF_HEATERS
   M84                             ; disable steppers
   STOP_LED_EFFECTS 
   STATUS_OFF
#########################################################################################################################################
[gcode_macro PAUSE]
description: Pause the actual running print
rename_existing: PAUSE_BASE
gcode:
  ##### get user parameters or use default #####
  {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}
  {% set idle_timeout = client.idle_timeout | default(0) %}
  {% set temp = printer[printer.toolhead.extruder].target if printer.toolhead.extruder != '' else 0 %}
  {% set restore = False if printer.toolhead.extruder == ''
              else True  if params.RESTORE | default(1) | int == 1 else False %}
  ##### end of definitions #####
  SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=last_extruder_temp VALUE="{{'restore': restore, 'temp': temp}}"
  # set a new idle_timeout value
  {% if idle_timeout > 0 %}
    SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=restore_idle_timeout VALUE={printer.configfile.settings.idle_timeout.timeout}
    SET_IDLE_TIMEOUT TIMEOUT={idle_timeout}
  {% endif %}
  PAUSE_BASE
  {client.user_pause_macro | default("")}
  _TOOLHEAD_PARK_PAUSE_CANCEL {rawparams}


[gcode_macro CANCEL_PRINT]
description: Cancel the actual running print
rename_existing: CANCEL_PRINT_BASE
gcode:
  ##### get user parameters or use default #####
  {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}
  {% set allow_park = client.park_at_cancel | default(false) | lower == 'true' %}
  {% set retract = client.cancel_retract | default(5.0) | abs %}
  ##### define park position #####
  {% set park_x = "" if (client.park_at_cancel_x | default(none) is none)
            else "X=" ~ client.park_at_cancel_x %}
  {% set park_y = "" if (client.park_at_cancel_y | default(none) is none)
            else "Y=" ~ client.park_at_cancel_y %}
  {% set custom_park = park_x | length > 0 or park_y | length > 0 %}
  ##### end of definitions #####
  # restore idle_timeout time if needed
  {% if printer['gcode_macro RESUME'].restore_idle_timeout > 0 %}
    SET_IDLE_TIMEOUT TIMEOUT={printer['gcode_macro RESUME'].restore_idle_timeout}
  {% endif %}
  {% if (custom_park or not printer.pause_resume.is_paused) and allow_park %} _TOOLHEAD_PARK_PAUSE_CANCEL {park_x} {park_y} {% endif %}
  _CLIENT_RETRACT LENGTH={retract}
  TURN_OFF_HEATERS
  M106 S0
  {client.user_cancel_macro | default("")}
  SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=idle_state VALUE=False
  # clear pause_next_layer and pause_at_layer as preparation for next print
  SET_PAUSE_NEXT_LAYER ENABLE=0
  SET_PAUSE_AT_LAYER ENABLE=0 LAYER=0
  CANCEL_PRINT_BASE

