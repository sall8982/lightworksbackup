#####################################################################
# 3. 저수준 제어 매크로 (실제 LED 명령 전송 핵심)
#####################################################################

[gcode_macro _set_leds_core]
gcode:
    {% set red = params.RED|default(0)|float %}
    {% set green = params.GREEN|default(0)|float %}
    {% set blue = params.BLUE|default(0)|float %}
    {% set white = params.WHITE|default(0)|float %}
    {% set led = params.LED|string %}
    {% set idx = (params.IDX|string).split(',') %}
    {% set transmit_last = params.TRANSMIT|default(1)|int %}

    {% for led_index in idx %}
        {% set transmit = transmit_last if loop.last else 0 %}
        set_led led={led} red={red} green={green} blue={blue} white={white} index={led_index} transmit={transmit}
    {% endfor %}

[gcode_macro _set_sb_leds_by_name]
gcode:
    {% set leds_name = params.LEDS %}
    {% set color_name = params.COLOR %}
    {% set color = printer["gcode_macro _sb_vars"].colors[leds_name][color_name] %}
    {% set led = printer["gcode_macro _sb_vars"][leds_name ~ "_led_name"] %}
    {% set idx = printer["gcode_macro _sb_vars"][leds_name ~ "_idx"] %}
    {% set transmit = params.TRANSMIT|default(1)|int %}
    _set_leds_core led={led} red={color.r} green={color.g} blue={color.b} white={color.w} idx="{idx}" transmit={transmit}

[gcode_macro _set_leftcase_leds_by_name]
gcode:
    {% set leds_name = params.LEDS %}
    {% set color_name = params.COLOR %}
    {% set color = printer["gcode_macro _leftcase_vars"].colors[leds_name][color_name] %}
    {% set led = printer["gcode_macro _leftcase_vars"][leds_name ~ "_led_name"] %}
    {% set idx = printer["gcode_macro _leftcase_vars"][leds_name ~ "_idx"] %}
    {% set transmit = params.TRANSMIT|default(1)|int %}
    _set_leds_core led={led} red={color.r} green={color.g} blue={color.b} white={color.w} idx="{idx}" transmit={transmit}

[gcode_macro _set_rightcase_leds_by_name]
gcode:
    {% set leds_name = params.LEDS %}
    {% set color_name = params.COLOR %}
    {% set color = printer["gcode_macro _rightcase_vars"].colors[leds_name][color_name] %}
    {% set led = printer["gcode_macro _rightcase_vars"][leds_name ~ "_led_name"] %}
    {% set idx = printer["gcode_macro _rightcase_vars"][leds_name ~ "_idx"] %}
    {% set transmit = params.TRANSMIT|default(1)|int %}
    _set_leds_core led={led} red={color.r} green={color.g} blue={color.b} white={color.w} idx="{idx}" transmit={transmit}

#####################################################################
# 4. 개별 제어 및 유틸리티 매크로
#####################################################################

[gcode_macro set_logo_leds_off]
gcode:
    _set_sb_leds_by_name leds="logo" color="off" transmit={params.TRANSMIT|default(1)}

[gcode_macro set_nozzle_leds_on]
gcode:
    _set_sb_leds_by_name leds="nozzle" color="on" transmit={params.TRANSMIT|default(1)}

[gcode_macro set_nozzle_leds_off]
gcode:
    _set_sb_leds_by_name leds="nozzle" color="off" transmit={params.TRANSMIT|default(1)}

[gcode_macro set_case_leds_on]
gcode:
    _set_leftcase_leds_by_name leds="leftcase" color="on" transmit={params.TRANSMIT|default(1)}
    _set_rightcase_leds_by_name leds="rightcase" color="on" transmit={params.TRANSMIT|default(1)}
[gcode_macro set_case_leds_off]
gcode:
    _set_leftcase_leds_by_name leds="leftcase" color="off" transmit={params.TRANSMIT|default(1)}
    _set_rightcase_leds_by_name leds="rightcase" color="off" transmit={params.TRANSMIT|default(1)}

