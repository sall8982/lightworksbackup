#####################################################################
# 1. 하드웨어 정의 (핀 설정 및 초기 상태)
#####################################################################

[neopixel sb_leds]
pin: sb_can_th: PB11
chain_count: 3
color_order: GRB
initial_RED: 1.0
initial_GREEN: 0.0
initial_BLUE: 1.0

[neopixel leftcase_leds]
pin: PE9
chain_count: 12
color_order: GRB
initial_RED: 0.5
initial_GREEN: 0.5
initial_BLUE: 0.5

[neopixel rightcase_leds]
pin: PE10
chain_count: 12
color_order: GRB
initial_RED: 0.5
initial_GREEN: 0.5
initial_BLUE: 0.5



