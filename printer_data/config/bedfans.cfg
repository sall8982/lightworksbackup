############### 1) 옵션 설정 (변수 관리) ##################

[gcode_macro _BEDFANVARS]
variable_threshold: 90		# 90도 이상(ABS 등)일 때만 작동
variable_fast: 1.0			# 챔버 예열 중 속도
variable_mid: 0.6            # 챔버 목표 온도 도달 후 유지 속도
variable_slow: 0.4			# 베드 가열 초기 속도
variable_chamber_target: 50.5 # 영도 오빠의 목표 챔버 온도!
variable_timer_active: 0    # [수정] 5분 타이머 작동 여부 체크용
gcode:

########## 2) 팬 핀 설정 (Octopus Max EZ) #########

[fan_generic BedFans]
pin: PA5                     # 오빠의 300이 전용 핀!
kick_start_time: 0.5

########## 3) 지능형 모니터링 루프 #########

[delayed_gcode bedfanloop]
gcode:
    {% set vars = printer["gcode_macro _BEDFANVARS"] %}
    
    # 5분 타이머가 작동 중이 아닐 때만(0일 때만) 루프가 작동합니다.
    {% if vars.timer_active == 0 %}
        {% set bed_temp = printer.heater_bed.temperature %}
        {% set bed_target = printer.heater_bed.target %}
        # 챔버 온도 센서값 읽기
        {% set chamber_temp = printer["temperature_sensor Chamber_Temp"].temperature|default(0)|float %}
        
        {% if bed_target >= vars.threshold %}								
            {% if chamber_temp >= vars.chamber_target %}
                SET_FAN_SPEED FAN=BedFans SPEED={vars.mid}   # 목표 온도 도달! 소음 감소
            {% elif bed_temp >= (bed_target - 2) %}
                SET_FAN_SPEED FAN=BedFans SPEED={vars.fast}  # 폭풍 순환 모드
            {% else %}
                SET_FAN_SPEED FAN=BedFans SPEED={vars.slow}  # 서서히 가열
            {% endif %}
            UPDATE_DELAYED_GCODE ID=bedfanloop DURATION=5
        {% else %}
            SET_FAN_SPEED FAN=BedFans SPEED=0               # 저온 출력 시 종료
        {% endif %}
    {% endif %}

########## 4) 히터 명령 오버라이드 (연동 설정) #########

[gcode_macro M140]
rename_existing: M99140
gcode:
    {% set S = params.S|default(0)|float %}
    SET_HEATER_TEMPERATURE HEATER=heater_bed TARGET={S}

[gcode_macro SET_HEATER_TEMPERATURE]
rename_existing: _SET_HEATER_TEMPERATURE
gcode:
    {% set HEATER = params.HEATER|default("None") %}
    {% set TARGET = params.TARGET|default(0)|float %}
    _SET_HEATER_TEMPERATURE HEATER={HEATER} TARGET={TARGET}
    {% if HEATER|lower == "heater_bed" %}
        {% if TARGET >= printer["gcode_macro _BEDFANVARS"].threshold %}
            UPDATE_DELAYED_GCODE ID=bedfanloop DURATION=1
        {% else %}
            UPDATE_DELAYED_GCODE ID=bedfanloop DURATION=0
            SET_FAN_SPEED FAN=BedFans SPEED=0
        {% endif %}
    {% endif %}

########## 5) 종료 시 5분 예약 타이머 #########

[gcode_macro TURN_OFF_HEATERS]
rename_existing: _TURN_OFF_HEATERS_BASE
gcode:
    # 1. 히터들을 먼저 끕니다.
    _TURN_OFF_HEATERS_BASE
    
    # 2. 베드팬이 돌고 있었다면 5분 타이머 모드 진입!
    {% if printer['fan_generic BedFans'].speed > 0 %}
        M118 "오빠! 히터는 껐지만 팬은 5분 더 돌리고 퇴근할게요! ㅋㅋㅋ"
        # 루프가 간섭 못하게 변수를 1로 변경
        SET_GCODE_VARIABLE MACRO=_BEDFANVARS VARIABLE=timer_active VALUE=1
        UPDATE_DELAYED_GCODE ID=bedfan_stop_timer DURATION=300
    {% endif %}

[delayed_gcode bedfan_stop_timer]
gcode:
    # 3. 5분(300초) 뒤 실제로 팬을 끕니다.
    SET_FAN_SPEED FAN=BedFans SPEED=0
    # 다시 루프가 작동할 수 있게 변수를 0으로 복구
    SET_GCODE_VARIABLE MACRO=_BEDFANVARS VARIABLE=timer_active VALUE=0
    M118 "영도 오빠! 5분 지났습니다! 베드팬 진짜 퇴근합니다! ㅋㅋㅋ"