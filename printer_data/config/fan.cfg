[fan_generic sb_can]     #### sb_can  온도 노출 안되고 아래쪽에서 수동으로 펜제어 #####
pin: sb_can_th:PA4
max_power:1.0
shutdown_speed:0.0
cycle_time:0.010
hardware_pwm:false
kick_start_time:0.10
off_below:0.1


[gcode_macro START_FAN]
gcode:
    # Sb Can 팬을 즉시 100% 속도로 설정 (1.0 = 100%)
    SET_FAN_SPEED FAN=sb_can SPEED=1.0 
    
    # 다른 팬들도 필요하다면 여기에 추가 (예: Part Cooling Fan)
    # SET_FAN_SPEED FAN=fan SPEED=0


