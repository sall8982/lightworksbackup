## Fan - Raspberry 쿨링팬 ##  Print Cooling Fan - mcu board
[temperature_fan Raspberry] 
pin: PB15
kick_start_time: 0.8
#shutdown_speed: 0
off_below: 0.1
max_power: 1.0
sensor_type: temperature_host
control: pid
min_temp: 5
max_temp: 85
pid_kp: 1.0
pid_ki: 0.5
pid_kd: 2.0
pid_deriv_time: 2.0
min_speed: 0.5
max_speed: 1.0
target_temp: 40


