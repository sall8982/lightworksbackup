[output_pin relay_on]
pin: rpi:gpio23
value: 0
shutdown_value: 0

[output_pin relay_off]
pin: rpi:gpio24
value: 0
shutdown_value: 0

[gcode_macro POWER_OFF_PRINTER]
gcode:
  SET_PIN PIN=relay_off VALUE=1
  G4 P500  # 0.5초 동안 신호 유지 (릴레이가 확실히 넘어가도록)
  SET_PIN PIN=relay_off VALUE=0

[gcode_macro POWER_ON_PRINTER]
gcode:
  SET_PIN PIN=relay_on VALUE=1
  G4 P500
  SET_PIN PIN=relay_on VALUE=0