# ======================================================================
# [V10 최종 가속도 정복]
# 1. 속도(Velocity): 240mm/s 고정 (검증된 한계 속도)
# 2. 가속도(Accel): 5,000 ~ 30,000까지 1,000씩 점진적 상승
# 3. 특징: 양방향 대각선 이동으로 A/B 모터 가속 토크 정밀 확인
# ======================================================================

[gcode_macro ACCEL_MAX_TEST_V10]
variable_current_accel: 5000
gcode:
    # 시작 가속도 설정 (기본 5,000)
    {% set a = params.START|default(5000)|int %}
    SET_GCODE_VARIABLE MACRO=ACCEL_MAX_TEST_V10 VARIABLE=current_accel VALUE={a}

    RESPOND MSG="영도 오빠! 속도는 240으로 묶었습니다. 이제 가속도 30,000까지 풀악셀! ㅋㅋㅋ"
    SET_FAN_SPEED FAN=BedFans SPEED=0.9
    
    # 루프 시작
    UPDATE_DELAYED_GCODE ID=_RUN_ACCEL_LOOP DURATION=0.5

[delayed_gcode _RUN_ACCEL_LOOP]
gcode:
    {% set current_a = printer["gcode_macro ACCEL_MAX_TEST_V10"].current_accel|int %}
    {% set fixed_v = 240 %} # 속도는 240 고정
    
    # 안전 영역 설정 (20mm 마진)
    {% set min_p, max_p = 20, 280 %}

    RESPOND MSG="🚀 현재 단계 -> 가속도: {current_a}, 속도: {fixed_v}"

    # 가속도 및 속도 제한 설정
    SET_VELOCITY_LIMIT MAX_VELOCITY={fixed_v} ACCEL={current_a} ACCEL_TO_DECEL={current_a / 2}

    # --- 양방향 대각선 찢기 (가속 토크 테스트) ---
    # ↙↗ 방향
    G1 X{min_p} Y{min_p} F{fixed_v * 60}
    G1 X{max_p} Y{max_p} F{fixed_v * 60}
    # ↖↘ 방향
    G1 X{min_p} Y{max_p} F{fixed_v * 60}
    G1 X{max_p} Y{min_p} F{fixed_v * 60}

    # 다음 단계 계산 (+1,000)
    {% set next_a = current_a + 1000 %}

    {% if next_a <= 30000 %}
        SET_GCODE_VARIABLE MACRO=ACCEL_MAX_TEST_V10 VARIABLE=current_accel VALUE={next_a}
        UPDATE_DELAYED_GCODE ID=_RUN_ACCEL_LOOP DURATION=1
    {% else %}
        RESPOND MSG="🏁 정산 파티 준비 완료! 가속도 30,000의 신세계를 보셨나요? ㅋㅋㅋ"
    {% endif %}