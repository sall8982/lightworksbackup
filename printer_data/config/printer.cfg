#####################################################################
# LDO V2.4 MOTOR KIT / LDO-VRN-2.4MTK
# LDO-42TH48-2004MAH(VRN) Rev B  0.9 degree
#####################################################################
# Motor-1   / b DRIVE  B 모터(갠트리 왼쪽)
[stepper_x]
step_pin: PC13      # 스텝 핀 활성화 핀
dir_pin: !PC14      # 모터 회전 방향 (정.역) 
enable_pin: !PE6   # 모터 전원 핀
microsteps: 16
full_steps_per_rotation: 400              #200 for 1.8 degree, 400 for 0.9 degree
rotation_distance: 40
endstop_pin: sb_can_th: PA0        ###   3pin io
#endstop_pin: ^!sb_can_th: PA2         ###   4pin io 
position_min: -5
position_endstop: 300
position_max: 305
homing_speed: 60             #Max 100
second_homing_speed: 25
homing_retract_dist: 10
homing_positive_dir: true   

[tmc2209 stepper_x]
uart_pin: PG14
diag_pin: PF0
interpolate: true     #   true    #   False
run_current: 1.3
stealthchop_threshold: 0


#####################################################################
# LDO V2.4 MOTOR KIT / LDO-VRN-2.4MTK
# LDO-42TH48-2004MAH(VRN) Rev B  0.9 degree
#####################################################################
# Motor-2  / a DRIVE A 모터(갠트리 오른쪽)
[stepper_y]
step_pin: PE4      # 스텝 핀 활성화 핀
dir_pin: !PE5       # 모터 회전 방향 (정.역) 
enable_pin: !PE3   # 모터 전원 핀
microsteps: 16
full_steps_per_rotation: 400             #200 for 1.8 degree, 400 for 0.9 degree
rotation_distance: 40
endstop_pin: PF0               # otopus max ez endstop pin
position_min: -2
position_endstop: 301
position_max: 301
homing_speed: 60             #Max 100
second_homing_speed: 25
homing_retract_dist: 10
homing_positive_dir: true

[tmc2209 stepper_y]
uart_pin: PG13
interpolate: true     #   true    #   False
run_current: 1.3
stealthchop_threshold: 0

#####################################################################
# LDO V2.4 MOTOR KIT / LDO-VRN-2.4MTK
# LDO-42TH48-2004AC(VRN) Rev D  1.8 degree
#####################################################################
# Motor-4  
[stepper_z]
step_pin: PB8    # 스텝 핀 활성화 핀  
dir_pin: !PB9     # 모터 회전 방향 (정.역) 
enable_pin: !PB7  # 모터 전원 핀
microsteps: 16
full_steps_per_rotation: 200              #200 for 1.8 degree, 400 for 0.9 degree
rotation_distance: 8
position_max: 220
position_min: -2
endstop_pin: probe:z_virtual_endstop        # catograper sensor
homing_retract_dist: 0       # cartographer
homing_speed: 20 
second_homing_speed: 5

[tmc2209 stepper_z]
uart_pin: PG11
interpolate: true     #   true    #   False
run_current: 1.2
#hold_current: 0.5
stealthchop_threshold: 999999         # Set to 999999 to turn stealthchop on, and 0 to use spreadcycle

#####################################################################
# LDO V2.4 MOTOR KIT / LDO-VRN-2.4MTK
# LDO-42TH48-2004AC(VRN) Rev D  1.8 degree
#####################################################################
# Motor-5
[stepper_z1]      
step_pin: PB5      # 스텝 핀 활성화 핀  
dir_pin: PB4      # 모터 회전 방향 (정.역) 
enable_pin: !PB6    # 모터 전원 핀
microsteps: 16
full_steps_per_rotation: 200              #200 for 1.8 degree, 400 for 0.9 degree
rotation_distance: 8

[tmc2209 stepper_z1]
uart_pin: PG10
interpolate: true     #   true    #   False
run_current: 1.2
#hold_current: 0.5
stealthchop_threshold: 999999         # Set to 999999 to turn stealthchop on, and 0 to use spreadcycle
#####################################################################
# LDO V2.4 MOTOR KIT / LDO-VRN-2.4MTK
# LDO-42TH48-2004AC(VRN) Rev D  1.8 degree
#####################################################################
# Motor-6
[stepper_z2]
step_pin: PG15       # 스텝 핀 활성화 핀 
dir_pin: !PB3        # 모터 회전 방향 (정.역)
enable_pin: !PD5    # 모터 전원 핀
microsteps: 16
full_steps_per_rotation: 200              #200 for 1.8 degree, 400 for 0.9 degree
rotation_distance: 8

[tmc2209 stepper_z2]
uart_pin: PG9
interpolate: true     #   true    #   False
run_current: 1.2
#hold_current: 0.5
stealthchop_threshold: 999999         # Set to 999999 to turn stealthchop on, and 0 to use spreadcycle

#####################################################################
# LDO V2.4 MOTOR KIT / LDO-VRN-2.4MTK
# LDO-42TH48-2004AC(VRN) Rev D  1.8 degree
#####################################################################
# Motor-7
[stepper_z3]
step_pin: PD3    # 스텝 핀 활성화 핀 
dir_pin: PD2     # 모터 회전 방향 (정.역)
enable_pin: !PD4 # 모터 전원 핀
microsteps: 16
full_steps_per_rotation: 200              #200 for 1.8 degree, 400 for 0.9 degree
rotation_distance: 8

[tmc2209 stepper_z3]
uart_pin: PD7
interpolate: true     #   true    #   False
run_current: 1.2
#hold_current: 0.5
stealthchop_threshold: 999999         # Set to 999999 to turn stealthchop on, and 0 to use spreadcycle


#####################################################################
# LDO V2.4 MOTOR KIT / LDO-VRN-2.4MTK
# LDO-36STH20-1004AHG(VRN) Rev B  1.8 degree
#####################################################################
[extruder]
step_pin: sb_can_th:PB3
dir_pin: !sb_can_th:PA8
enable_pin: !sb_can_th:PA15 
rotation_distance: 22.6789511   #Bondtech 5mm Drive Gears
gear_ratio: 50:10               #for Stealthburner/Clockwork2 BMG Gear Ratio
microsteps: 16
full_steps_per_rotation: 200    #200 for 1.8 degree, 400 for 0.9 degree
nozzle_diameter: 0.40
filament_diameter: 1.75
heater_pin: sb_can_th:PC15
sensor_type: Generic 3950
sensor_pin: sb_can_th:PA6
min_temp: 0  #1 #-273.15 # 1 #zzcatvs mod
max_temp: 280 #360 #99999 # 360 #zzcatvs mod 
max_power: 1.0
min_extrude_temp: 10
#control = pid
#pid_kp = 26.213
#pid_ki = 1.304
#pid_kd = 131.721
##Try to keep pressure_advance below 1.0
pressure_advance: 0.01   
pressure_advance_smooth_time: 0.040    # Default is 0.040, leave stock
max_extrude_cross_section: 5000.0
max_extrude_only_distance: 500      ####  ai 적용    -안전한 압출 거리를 제한하는 값입니다. 이 값은 노즐이 움직이지 않고 압출만 하는 경우, 즉 G1 E500 같은 명령이 실행될 때 최대 허용 압출 거리를 의미 ####  

[tmc2209 extruder]
uart_pin: sb_can_th:PA10
tx_pin: sb_can_th:PA9
interpolate: False     #### ai 가 적용 모터소음이 클때 true #####
run_current: 0.7     #### ai 가 적용
hold_current: 0.4     #### ai 가 적용
uart_address: 0
#sense_resistor: 0.110
stealthchop_threshold: 0
##diag_pin: sb_can_th:PB5



[heater_bed]
heater_pin: PF5
sensor_pin: PB1 # TB
sensor_type: ATC Semitec 104GT-2
#control: pid
#pid_kp: 58.437
#pid_ki: 2.347
#pid_kd: 363.769
min_temp: 0
max_temp: 130


[quad_gantry_level]
 gantry_corners:
   -60,-10
   360,370
   
##  Probe points
 points:           
   25,25
   25,250
   275,250
   275,25
speed: 200
horizontal_move_z: 0
retries: 15
retry_tolerance: 0.00500
max_adjust: 10


[bed_mesh]
zero_reference_position: 150,150        # home position
speed: 300
horizontal_move_z: 3
mesh_min: 25, 25  
mesh_max: 275, 260 
probe_count: 20,20
adaptive_margin: 10
mesh_pps: 0,0 # Disable interpolation - mesh is probably dense enough
#algorithm: bicubic
#fade_start: 0.6
#fade_end: 10.0

[gcode_macro G32]
description: "Full auto leveling with Cartographer and BED Mesh"
gcode:
    STATUS_READY
    G90
    BED_MESH_CLEAR
    STATUS_HOMING
    G28
    
    # --- 여기서 온도를 먼저 잡아야 QGL이 안 튕깁니다 ---
    STATUS_HEATING
    SET_DISPLAY_TEXT MSG="Waiting for Nozzle to cool to 150C"
    M109 S150       # 노즐 온도가 150도가 될 때까지 대기
    
    STATUS_LEVELING
    SET_DISPLAY_TEXT MSG="QGL"
    QUAD_GANTRY_LEVEL
    
    STATUS_READY
    # --- 이미 위에서 150도로 맞췄으니 이 부분은 통과 ---
    STATUS_HOMING
    SET_DISPLAY_TEXT MSG="CARTOGRAPHER_TOUCH"
    CARTOGRAPHER_TOUCH_HOME
    
    STATUS_READY
    STATUS_MESHING
    SET_DISPLAY_TEXT MSG="BED MESH"
    BED_MESH_CALIBRATE
    
    # M109 S0 # <-- 혹시 바로 출력하실 거면 이건 지우거나 주석 처리하세요. 노즐 식어버려요!
    BED_MESH_PROFILE SAVE="hot"
    BED_MESH_PROFILE LOAD="hot"
    STATUS_READY
    G28
#####################################################################
[delayed_gcode _INIT_TIMELAPSE_CHECK_TIME]
initial_duration: 1
gcode: SET_GCODE_VARIABLE MACRO=TIMELAPSE_TAKE_FRAME VARIABLE=check_time VALUE=0.5 

##########################################################################################################################################  
#   Use  print_start for the slicer ending script - please customise for your slicer of choice
##########################################################################################################################################
[gcode_macro print_start]    #    큐라 슬라이서   ###  print_start BED_TEMP={material_bed_temperature_layer_0} EXTRUDER_TEMP={material_print_temperature_layer_0}      
gcode:
    # --- 조명 시작: 준비 모드 ---
    LED_BLUE
    SET_GCODE_VARIABLE MACRO=TIMELAPSE_TAKE_FRAME VARIABLE=check_time VALUE=0.5 
    {% set BED_TEMP = params.BED_TEMP|default(60)|float %}
    {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(150)|float %}

    STATUS_READY
    SET_GCODE_OFFSET Z=0 ; Z 오프셋 초기화
    STATUS_HOMING
    SET_DISPLAY_TEXT MSG="Homing..."
    G28
    G90 ; 절대 좌표
    
    # --- 조명: 베드 히팅 중 (레드) ---
    LED_RED
    STATUS_HEATING
    SET_DISPLAY_TEXT MSG="Heating Bed: {BED_TEMP}°C"
    M140 S{BED_TEMP}          # 베드 가열 시작
    M190 S{BED_TEMP}          # 베드 온도 도달까지 대기

    # --- 영도 오빠의 챔버 대기 마법 ---
    {% if BED_TEMP >= 90 %}
        # 챔버 기다리는 동안 지루하지 않게 무지개 효과!
        LED_RAINBOW
        M118 오빠! 챔버 예열을 위해 베드 팬 가동합니다! ㅋㅋㅋ
        SET_FAN_SPEED FAN=BedFans SPEED=0.9
        SET_DISPLAY_TEXT MSG="Chamber Heating: 40C..."
        TEMPERATURE_WAIT SENSOR="temperature_sensor Chamber_Temp" MINIMUM=40
        M118 40도 달성! 이제 300이 달립니다! 슝~!
    {% endif %}

    # 다시 작업 모드로 (화이트)
    LIGHTS_ON
    STATUS_LEVELING
    SET_DISPLAY_TEXT MSG="QUAD_GANTRY_LEVELling..."
    QUAD_GANTRY_LEVEL
    G28 Z                     # QGL 후 Z축 다시 잡기

    STATUS_MESHING 
    SET_DISPLAY_TEXT MSG="Bed Mesh Calibration" 
    BED_MESH_CLEAR
    BED_MESH_CALIBRATE        # 카토그래퍼로 빠르게 메쉬 생성

    SET_DISPLAY_TEXT MSG="Heating Nozzle: 150C"
    M109 S150                

    STATUS_HOMING
    SET_DISPLAY_TEXT MSG="Cartographer Touch Home" 
    CARTOGRAPHER_TOUCH_HOME   # 진짜 Z0 잡기

    # --- 조명: 최종 노즐 히팅 (다시 레드) ---
    LED_RED
    SET_DISPLAY_TEXT MSG="Heating Nozzle: {EXTRUDER_TEMP}C"
    M104 S{EXTRUDER_TEMP}     # 최종 출력 온도 설정
    M109 S{EXTRUDER_TEMP}     # 최종 온도 대기

    # --- 조명: 출력 시작 (밝은 화이트) ---
    LIGHTS_ON
    STATUS_PRINTING
    SET_DISPLAY_TEXT MSG="Nozzle Draw (Purge)" 
    G92 E0.0                          # 익스트루더 초기화
    G90                               # 지우지말것!
    G1 Z10 F3000                      # 노즐 살짝 들기
    
    G1 X5 Y5 Z0.5 F5000.0             # 퍼지 시작
    M221 S100                         
    G1 X5 Y200.0 Z0.3 F3000.0 E15     
    G1 X5.5 Y200.0 Z0.3 F5000.0    
    G1 X5.5 Y30 Z0.3 F3000.0 E25    
    G92 E0                         
    G1 Z2.0 F3500                  
    SET_DISPLAY_TEXT MSG="NOW PRINTING"
    G90                            

[gcode_macro print_end]
gcode:
    STATUS_BUSY
    M400
    G91
    G92 E0
    G1 X-2 Y-2 E-3 F300
    G0 Z1.00 X20.0 Y20.0 F20000
    G1 Z5 F3000
    G90
    G0 X150 Y300 F3600

    # --- 조명: 출력 완료 (그린!) ---
    LED_GREEN
    
    TURN_OFF_HEATERS                
    BED_MESH_CLEAR
    TIMELAPSE_RENDER                
    
    M118 "노즐 식히는 중... 50도 찍으면 마무리합니다!"
    # 노즐 식히는 동안은 은은하게 브리딩 효과
    LED_BREATHING
    TEMPERATURE_WAIT SENSOR=extruder MAXIMUM=50     
    
    M106 S0                         
    M84 XYE                         
    STATUS_OFF
    # --- 조명: 완전 종료 ---
    LIGHTS_OFF
    M118 "영도 오빠! 300이가 오늘 고생 많았대요! ㅋㅋㅋ 퇴근!"

[board_pins]
aliases:
    # FPC header, Aliases EXP1 & EXP2 for mini12864
    EXP1_1=PG2, EXP1_2=PD15,
    EXP1_3=PD14, EXP1_4=PD13,
    EXP1_5=PD12, EXP1_6=PD11,
    EXP1_7=PD10, EXP1_8=PE15,
    EXP1_9=<GND>, EXP1_10=<5V>,

