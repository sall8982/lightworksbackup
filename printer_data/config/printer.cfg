#####################################################################
#####################################################################
#   PRINTER
#####################################################################
[printer]
kinematics: corexy
max_velocity: 300
max_accel: 5000             # 5000 기본 가속도!   테스트 13000
max_z_velocity: 30          # 이건 그대로 유지!
max_z_accel: 200            # 이것도 그대로 유지!
minimum_cruise_ratio: 0.25   # 최신 클리퍼 권장값 (기존 0.25보다 부드러움)
square_corner_velocity: 5.0 # 공식으로 계산시 10


################################## <<<<<<<<    MY MCUS >>>>>>>> ##########################################################

####   [mcu rpi]            serial: /tmp/klipper_host_mcu
####   [mcu]                skr 옥토퍼스 max ez                                                                                     canbus_uuid: d63877f5110a    120 ohm
####   [mcu scanner]        #serial: /dev/serial/by-id/usb-cartographer                                CARTOGRAPHER 5.1.0          canbus_uuid: 
####   [mcu sb_can_th]      usb-Klipper_stm32f072xb_20003C000757435433353320-if00 -> ../../ttyACM0     sb combo v2                 canbus_uuid:                 120 ohm

##########################################################################################################################
#####################################################################
[mcu]     # test  max ez 
#canbus_uuid: d63877f5110a
serial: /dev/serial/by-id/usb-Klipper_stm32h723xx_4A0026000651323235363233-if00
#####################################################################

[mcu cartographer]  
canbus_uuid: 50f0c30320a1      

[cartographer]                 
mcu: cartographer           
###   Offsets are measured from the centre of your coil, to the tip of your nozzle 
###   on a level axis. It is vital that this is accurate. 
x_offset: 0                          
###    adjust for your cartographers offset from nozzle to middle of coil
y_offset: 21.1
verbose: no # For extra output

[mcu rpi]
serial: /tmp/klipper_host_mcu


[mcu sb_can_th]     
canbus_uuid: 16605c82ac02

[axis_twist_compensation]
[respond]
