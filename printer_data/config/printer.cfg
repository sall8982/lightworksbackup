#####################################################################
#   safe_z_home Settings
#####################################################################
[safe_z_home]
home_xy_position:150,150                     ###  베드중앙  Cartographer ###
speed: 80
z_hop: 5
z_hop_speed: 5


#########################################################################################################################################
[idle_timeout]
gcode:
    # 출력 중이 아닐 때만 작동하도록 히터와 모터만 끕니다.
    TURN_OFF_HEATERS
    M84
    STATUS_OFF
    M118 Idle Timeout 😴
timeout: 1200

#####################################################################
#####################################################################
[gcode_arcs]         ###   원 출력 설정 #######
resolution: 0.1

[exclude_object]      ####  객채재외 기능 #####

[gcode_macro M205]    #### 마린(Marlin) 전용 명령어가 슬라이서에서 출력될때#######
gcode:
 G4
 

##############   firmware_retraction  start ###################
[firmware_retraction]
retract_length: 0.8
# 리트랙션 거리: CW2는 다이렉트 방식이라 0.5~1.0 사이가 적당해요. 
# 0.8로 시작해서 거미줄 보고 조절합시다!

retract_speed: 40
# 당기는 속도: 너무 빠르면 필라멘트 갉아먹으니 40mm/s 정도가 안전해요.

unretract_extra_length: 0
# 다시 밀 때 추가량: 보통은 0인데, 노즐 끝에서 똥이 생기면 마이너스(-) 값을 줍니다.

unretract_speed: 30
# 다시 미는 속도: 당길 때보다는 살짝 천천히 밀어주는 게 기포 방지에 좋아요.

[save_variables]
filename: ~/printer_data/config/variables.cfg
# 변수 저장 파일: 경로를 최근 클리퍼 표준인 printer_data 쪽으로 잡아주는 게 좋습니다.
##############   firmware_retraction  end ###################

#####################################################################
# LDO V2.4 MOTOR KIT / LDO-VRN-2.4MTK
# LDO-42TH48-2004MAH(VRN) Rev B  0.9 degree
#####################################################################
# Motor-1   / b DRIVE  B 모터(갠트리 왼쪽)
[stepper_x]
step_pin: PC13      # 스텝 핀 활성화 핀
dir_pin: !PC14      # 모터 회전 방향 (정.역) 
enable_pin: !PE6   # 모터 전원 핀
microsteps: 16
full_steps_per_rotation: 400              #200 for 1.8 degree, 400 for 0.9 degree
rotation_distance: 40
endstop_pin: sb_can_th: PA0        ###   3pin io
#endstop_pin: ^!sb_can_th: PA2         ###   4pin io 
position_min: -5
position_endstop: 300
position_max: 305
homing_speed: 60             #Max 100
second_homing_speed: 25
homing_retract_dist: 10
homing_positive_dir: true   

[tmc2209 stepper_x]
uart_pin: PG14
diag_pin: PF0
run_current: 0.800
stealthchop_threshold: 0


#####################################################################
# LDO V2.4 MOTOR KIT / LDO-VRN-2.4MTK
# LDO-42TH48-2004MAH(VRN) Rev B  0.9 degree
#####################################################################
# Motor-2  / a DRIVE A 모터(갠트리 오른쪽)
[stepper_y]
step_pin: PE4      # 스텝 핀 활성화 핀
dir_pin: !PE5       # 모터 회전 방향 (정.역) 
enable_pin: !PE3   # 모터 전원 핀
microsteps: 16
full_steps_per_rotation: 400             #200 for 1.8 degree, 400 for 0.9 degree
rotation_distance: 40
endstop_pin: PF0               # otopus max ez endstop pin
position_min: -2
position_endstop: 301
position_max: 301
homing_speed: 60             #Max 100
second_homing_speed: 25
homing_retract_dist: 10
homing_positive_dir: true

[tmc2209 stepper_y]
uart_pin: PG13
run_current: 0.800
stealthchop_threshold: 0

#####################################################################
# LDO V2.4 MOTOR KIT / LDO-VRN-2.4MTK
# LDO-42TH48-2004AC(VRN) Rev D  1.8 degree
#####################################################################
# Motor-4  
[stepper_z]
step_pin: PB8    # 스텝 핀 활성화 핀  
dir_pin: !PB9     # 모터 회전 방향 (정.역) 
enable_pin: !PB7  # 모터 전원 핀
microsteps: 16
full_steps_per_rotation: 200              #200 for 1.8 degree, 400 for 0.9 degree
rotation_distance: 8
position_max: 220
position_min: -2
homing_retract_dist: 0       # cartographer
homing_speed: 20 
second_homing_speed: 5
#endstop_pin: PF4        #  otopus max ez end stop pin 사용안함
endstop_pin: probe:z_virtual_endstop         # catograper sensor

[tmc2209 stepper_z]
uart_pin: PG11
run_current: 0.9
stealthchop_threshold: 999999         # Set to 999999 to turn stealthchop on, and 0 to use spreadcycle

#####################################################################
# LDO V2.4 MOTOR KIT / LDO-VRN-2.4MTK
# LDO-42TH48-2004AC(VRN) Rev D  1.8 degree
#####################################################################
# Motor-5
[stepper_z1]      
step_pin: PB5      # 스텝 핀 활성화 핀  
dir_pin: PB4      # 모터 회전 방향 (정.역) 
enable_pin: !PB6    # 모터 전원 핀
microsteps: 16
full_steps_per_rotation: 200              #200 for 1.8 degree, 400 for 0.9 degree
rotation_distance: 8

[tmc2209 stepper_z1]
uart_pin: PG10
run_current: 0.9
stealthchop_threshold: 999999

#####################################################################
# LDO V2.4 MOTOR KIT / LDO-VRN-2.4MTK
# LDO-42TH48-2004AC(VRN) Rev D  1.8 degree
#####################################################################
# Motor-6
[stepper_z2]
step_pin: PG15       # 스텝 핀 활성화 핀 
dir_pin: !PB3        # 모터 회전 방향 (정.역)
enable_pin: !PD5    # 모터 전원 핀
microsteps: 16
full_steps_per_rotation: 200              #200 for 1.8 degree, 400 for 0.9 degree
rotation_distance: 8

[tmc2209 stepper_z2]
uart_pin: PG9
run_current: 0.9
stealthchop_threshold: 999999

#####################################################################
# LDO V2.4 MOTOR KIT / LDO-VRN-2.4MTK
# LDO-42TH48-2004AC(VRN) Rev D  1.8 degree
#####################################################################
# Motor-7
[stepper_z3]
step_pin: PD3    # 스텝 핀 활성화 핀 
dir_pin: PD2     # 모터 회전 방향 (정.역)
enable_pin: !PD4 # 모터 전원 핀
microsteps: 16
full_steps_per_rotation: 200              #200 for 1.8 degree, 400 for 0.9 degree
rotation_distance: 8

[tmc2209 stepper_z3]
uart_pin: PD7
run_current: 0.9
stealthchop_threshold: 999999


#####################################################################
# LDO V2.4 MOTOR KIT / LDO-VRN-2.4MTK
# LDO-36STH20-1004AHG(VRN) Rev B  1.8 degree
#####################################################################
[extruder]
step_pin: sb_can_th:PB3
dir_pin: !sb_can_th:PA8
enable_pin: !sb_can_th:PA15 
rotation_distance: 22.6789511   #Bondtech 5mm Drive Gears
gear_ratio: 50:10               #for Stealthburner/Clockwork2 BMG Gear Ratio
microsteps: 16
full_steps_per_rotation: 200    #200 for 1.8 degree, 400 for 0.9 degree
nozzle_diameter: 0.40
filament_diameter: 1.75
heater_pin: sb_can_th:PC15
sensor_type: Generic 3950
sensor_pin: sb_can_th:PA6
min_temp: 0  #1 #-273.15 # 1 #zzcatvs mod
max_temp: 280 #360 #99999 # 360 #zzcatvs mod 
max_power: 1.0
min_extrude_temp: 10
#control = pid
#pid_kp = 26.213
#pid_ki = 1.304
#pid_kd = 131.721
##Try to keep pressure_advance below 1.0
pressure_advance: 0.05    
pressure_advance_smooth_time: 0.040    # Default is 0.040, leave stock
max_extrude_cross_section: 5000.0
max_extrude_only_distance: 500      ####  ai 적용    -안전한 압출 거리를 제한하는 값입니다. 이 값은 노즐이 움직이지 않고 압출만 하는 경우, 즉 G1 E500 같은 명령이 실행될 때 최대 허용 압출 거리를 의미 ####  

[tmc2209 extruder]
uart_pin: sb_can_th:PA10
tx_pin: sb_can_th:PA9
interpolate: False     #### ai 가 적용 모터소음이 클때 true #####
run_current: 0.7     #### ai 가 적용
hold_current: 0.4     #### ai 가 적용
uart_address: 0
sense_resistor: 0.110
stealthchop_threshold: 0
##diag_pin: sb_can_th:PB5



[heater_bed]
heater_pin: PF5
sensor_pin: PB1 # TB
sensor_type: ATC Semitec 104GT-2
#control: pid
#pid_kp: 58.437
#pid_ki: 2.347
#pid_kd: 363.769
min_temp: 0
max_temp: 130


[quad_gantry_level]
 gantry_corners:
   -60,-10
   360,370
   
##  Probe points
 points:           
   25,25
   25,250
   275,250
   275,25
speed: 200
horizontal_move_z: 2
retries: 15
retry_tolerance: 0.00500
max_adjust: 10


[bed_mesh]
zero_reference_position: 150,150        # home position
speed: 300
horizontal_move_z: 3
mesh_min: 25, 25  
mesh_max: 275, 260 
probe_count: 20,20
adaptive_margin: 10
mesh_pps: 2,2
algorithm: bicubic
fade_start: 0.6
fade_end: 10.0

[gcode_macro G32]
description: "Full auto leveling with Cartographer and BED Mesh"
gcode:
    STATUS_READY
    G90
    BED_MESH_CLEAR
    STATUS_HOMING
    G28
    STATUS_READY
    STATUS_LEVELING
    SET_DISPLAY_TEXT MSG="QGL"
    QUAD_GANTRY_LEVEL
    STATUS_READY
    STATUS_HEATING
    M109 S150
    STATUS_READY
    STATUS_HOMING
    SET_DISPLAY_TEXT MSG="CARTOGRAPHER_TOUCH"
    CARTOGRAPHER_TOUCH_HOME
    STATUS_READY
    STATUS_MESHING
    SET_DISPLAY_TEXT MSG="BED MESH"
    BED_MESH_CALIBRATE
    M109 S0
    BED_MESH_PROFILE SAVE="default"
    BED_MESH_PROFILE LOAD="default"
    STATUS_READY
    G28
#####################################################################
[delayed_gcode _INIT_TIMELAPSE_CHECK_TIME]
initial_duration: 1
gcode: SET_GCODE_VARIABLE MACRO=TIMELAPSE_TAKE_FRAME VARIABLE=check_time VALUE=0.5 

##########################################################################################################################################  
#   Use  print_start for the slicer ending script - please customise for your slicer of choice
##########################################################################################################################################
[gcode_macro print_start]
gcode:
    # 슬라이서 변수 가져오기
    {% set BED_TEMP = params.BED_TEMP|default(60)|float %}
    {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(200)|float %}

    SET_GCODE_VARIABLE MACRO=TIMELAPSE_TAKE_FRAME VARIABLE=check_time VALUE=0.5 
    SET_GCODE_OFFSET Z=0 ; Z 오프셋 초기화
    
    STATUS_HOMING
    SET_DISPLAY_TEXT MSG="Homing..."
    G28
    G90 ; 절대 좌표

    STATUS_HEATING
    SET_DISPLAY_TEXT MSG="Heating Bed: {BED_TEMP}C"
    M140 S{BED_TEMP}          # 베드 가열 시작
    M190 S{BED_TEMP}          # 베드 온도 도달까지 대기

    STATUS_LEVELING
    SET_DISPLAY_TEXT MSG="QGL..."
    QUAD_GANTRY_LEVEL
    G28 Z                     # QGL 후 Z축 다시 잡기

    STATUS_MESHING 
    SET_DISPLAY_TEXT MSG="Bed Mesh Calibration" 
    BED_MESH_CLEAR
    BED_MESH_CALIBRATE        # 카토그래퍼로 빠르게 메쉬 생성

    SET_DISPLAY_TEXT MSG="Heating Nozzle: 150C"
    M109 S150                 # 터치 홈잉 전 예열 (너무 뜨거우면 베드 손상되니 150도)

    STATUS_HOMING
    SET_DISPLAY_TEXT MSG="Cartographer Touch Home" 
    CARTOGRAPHER_TOUCH_HOME   # 진짜 Z0 잡기

    SET_DISPLAY_TEXT MSG="Heating Nozzle: {EXTRUDER_TEMP}C"
    M104 S{EXTRUDER_TEMP}     # 최종 출력 온도 설정
    M109 S{EXTRUDER_TEMP}     # 최종 온도 대기

    STATUS_PRINTING
    SET_DISPLAY_TEXT MSG="Nozzle Draw (Purge)" 
    G92 E0                    # 익스트루더 초기화
    G1 Z10 F3000              # 노즐 살짝 들기
    
    # --- 300mm 베드용 퍼지 라인 (왼쪽 앞) ---
    G1 X5 Y5 Z0.5 F5000.0     # 시작 지점으로 이동
    G1 X5 Y200.0 Z0.3 F3000.0 E15  # 첫 번째 줄 (200mm)
    G1 X5.5 Y200.0 Z0.3 F5000.0    # 옆으로 살짝 이동
    G1 X5.5 Y5 Z0.3 F3000.0 E30    # 두 번째 줄 돌아오기
    
    G92 E0                    # 익스트루더 초기화
    G1 Z2.0 F3500             # 베드 긁힘 방지용 들기
    SET_DISPLAY_TEXT MSG="NOW PRINTING"
    G90

[gcode_macro print_end]
gcode:
    STATUS_BUSY
    M400
    G91
    G92 E0
    G1 X-2 Y-2 E-3 F300
    G0 Z1.00 X20.0 Y20.0 F20000
    G1 Z5 F3000
    G90                             ; 절대 좌표로 복귀

    # [1순위] 일단 좌표 살아있을 때 뒤로 보내기! (여기서 이미 파킹 끝!)
    G0 X150 Y300 F3600             
    
    # [2순위] 히터부터 꺼서 전기 아끼기! ㅋㅋㅋ
    TURN_OFF_HEATERS
    M104 S0
    M140 S0
    BED_MESH_CLEAR

    # [3순위] 이제 20분이 걸리든 1시간이 걸리든 상관없음!
    TIMELAPSE_RENDER               
    
    # [4순위] 다 끝나면 조용히 팬 끄고 마무리
    TEMPERATURE_WAIT SENSOR=extruder MAXIMUM=45 
    M106 S0
    M84 XYE
    STATUS_OFF
    M118 프린터 종료


[board_pins]
aliases:
    # FPC header, Aliases EXP1 & EXP2 for mini12864
    EXP1_1=PG2, EXP1_2=PD15,
    EXP1_3=PD14, EXP1_4=PD13,
    EXP1_5=PD12, EXP1_6=PD11,
    EXP1_7=PD10, EXP1_8=PE15,
    EXP1_9=<GND>, EXP1_10=<5V>,

    # EXP2 header
    EXP2_1=PE13, EXP2_2=PE12,
    EXP2_3=PG5, EXP2_4=PE11,
    EXP2_5=PG4, EXP2_6=PE14,
    EXP2_7=PG3, EXP2_8=<RST>,
    EXP2_9=<GND>, EXP2_10=<NC>

