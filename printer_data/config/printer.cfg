#####################################################################
#   LED Control
#####################################################################
#    STATUS_READY
#    STATUS_OFF
#    STATUS_BUSY
#    STATUS_HEATING
#    STATUS_LEVELING
#    STATUS_HOMING
#    STATUS_CLEANING
#    STATUS_MESHING
#    STATUS_CALIBRATING_Z
#####################################################################
[gcode_macro G32]
description: "Full auto leveling with Cartographer and BED Mesh"
gcode:
    STATUS_READY
    G90
    BED_MESH_CLEAR
    STATUS_HOMING
    G28
    STATUS_READY
    STATUS_LEVELING
    SET_DISPLAY_TEXT MSG="QGL"
    QUAD_GANTRY_LEVEL
    STATUS_READY
    STATUS_HEATING
    M109 S150
    STATUS_READY
    STATUS_HOMING
    SET_DISPLAY_TEXT MSG="CARTOGRAPHER_TOUCH"
    #CARTOGRAPHER_TOUCH_V3
    CARTOGRAPHER_TOUCH_HOME
    STATUS_READY
    STATUS_MESHING
    SET_DISPLAY_TEXT MSG="BED MESH"
    BED_MESH_CALIBRATE
    M109 S0
    BED_MESH_PROFILE SAVE="hot"
    BED_MESH_PROFILE LOAD="hot"
    STATUS_READY
    G28
#####################################################################
[delayed_gcode _INIT_TIMELAPSE_CHECK_TIME]
initial_duration: 1
gcode: SET_GCODE_VARIABLE MACRO=TIMELAPSE_TAKE_FRAME VARIABLE=check_time VALUE=0.5 

##########################################################################################################################################  
#   Use  print_start for the slicer ending script - please customise for your slicer of choice
##########################################################################################################################################
[gcode_macro print_start]     #    큐라 슬라이서   ###  print_start BED_TEMP={material_bed_temperature_layer_0} EXTRUDER_TEMP={material_print_temperature_layer_0}   
gcode:
        SET_GCODE_VARIABLE MACRO=TIMELAPSE_TAKE_FRAME VARIABLE=check_time VALUE=0.5 
        #  slicer에서 넘어온 변수값   ###  슬라이서에 삽입(큐라) START_PRINT BED_TEMP={material_bed_temperature_layer_0} EXTRUDER_TEMP={material_print_temperature_layer_0}
        {% set BED_TEMP = params.BED_TEMP|default(60)|float %}
        {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(150)|float %}
      
    STATUS_READY
    SET_GCODE_OFFSET Z=0 ; Reset Z offset   
    STATUS_HOMING
    SET_DISPLAY_TEXT MSG="homeing..." 
    G28
    G90
    STATUS_HEATING
    SET_DISPLAY_TEXT MSG="Heating Bed: {BED_TEMP}°C"   
    M140 S{BED_TEMP}          # 베드 가열 시작
    M190 S{BED_TEMP}          # 베드 온도 도달까지 대기
  
   
    SET_DISPLAY_TEXT MSG="clean_nozzle" 
    clean_nozzle
    
    STATUS_LEVELING
    SET_DISPLAY_TEXT MSG="QUAD_GANTRY_LEVELling..." 
    QUAD_GANTRY_LEVEL
    G28 Z               # QGL 후 Z축 다시 잡기
    
    STATUS_MESHING 
    SET_DISPLAY_TEXT MSG="Bed Mesh Calibration" 
    BED_MESH_CLEAR
    BED_MESH_CALIBRATE                            # 카토그래퍼로 빠르게 메쉬 생성
    
    SET_DISPLAY_TEXT MSG="CARTOGRAPHER TOUCH LEVELing"    
    # CARTOGRAPHER_TOUCH_V3                  ### CARTOGRAPHER_TOUCH LEVELing ####
    SET_DISPLAY_TEXT MSG="Heating Nozzle: 150C"    # 터치 홈잉 전 예열 (너무 뜨거우면 베드 손상되니 150도)
    M109 S150                
    
    SET_DISPLAY_TEXT MSG="nozzl fuzing" 
    clean_nozzle
    
    STATUS_HOMING
    SET_DISPLAY_TEXT MSG="Cartographer Touch Home" 
    CARTOGRAPHER_TOUCH_HOME   # 진짜 Z0 잡기
    
    M104 S{EXTRUDER_TEMP}     # 최종 출력 온도 설정
    M109 S{EXTRUDER_TEMP}     # 최종 온도 대기
   
    STATUS_PRINTING
    SET_DISPLAY_TEXT MSG="nozzle Draw" 
    G92 E0.0                          # 익스트루더 초기화
    G90                               # 지우지말것!
    G1 Z10 F3000                      # # 노즐 살짝 들기
    
    # --- 700mm 베드용 퍼지 라인 (왼쪽 앞) ---
    G1 X10.5 Y20 Z0.5 F5000.0         # 시작 지점으로 이동
    M221 S100                         # 압출량 100%로 설정    
    G1 X10 Y450.0 Z0.2 F5000.0 E15    # 첫 번째 줄 (200mm)
    G1 X13 Y450.0 Z0.2 F5000.0        # 옆으로 살짝 이동
    G1 X11.0 Y20 Z0.2 F5000.0 E30     # 두 번째 줄 돌아오기
    G92 E0.0                          # 익스트루더 초기화
    G1 Z2.0 F3500                     # 베드 긁힘 방지용 들기
    SET_DISPLAY_TEXT MSG="NOW PRINTING" 
    G90                               # Switch back to absolute positioning   퍼지후 센터에서 출력시작 (지우지말것!)


##########################################################################################################################################   
#   Use PRINT_END for the slicer ending script - please customise for your slicer of choice
##########################################################################################################################################
#[gcode_macro print_end]
#gcode:
#    STATUS_BUSY
#    M400                           ; wait for buffer to clear
#    G91                            ; relative positioning
#    G92 E0                         ; zero the extruder
#    G1 X-2 Y-2 E-3 F300            ; retract filament  
#    G0 Z1.00 X20.0 Y20.0 F20000    ; move nozzle to remove stringing
#    TURN_OFF_HEATERS
#    G1 Z5 F3000                    ; move nozzle up 5mm
#    G90                            ; absolute positioning
#    G0 X710 Y490 F3600            ; park nozzle at rear
#    #G0 X710 Y50 F3600              ; park nozzle at FRONT
#    BED_MESH_CLEAR
#    STATUS_READY
#    M104 S0                        ; 핫엔드 끄기
#    M140 S0                        ; 베드 끄기 
#    G4 S900                        ; 10분 대기 
#    M106 S0                        ; turn off fan 
#    M84 XYE                        ; Z를 제외한 모든 스테퍼 비활성화
#    M81                            ; ATX Power Off
#    STATUS_OFF

[gcode_macro print_end]
gcode:
    STATUS_BUSY
    M400                            ; wait for buffer to clear
    G91                             ; relative positioning
    G92 E0                          ; zero the extruder
    G1 X-2 Y-2 E-3 F300             ; retract filament  
    G0 Z1.00 X20.0 Y20.0 F20000     ; move nozzle to remove stringing
    G1 Z5 F3000                     ; move nozzle up 5mm
    G90                             ; 절대 좌표로 복귀
    G0 X710 Y490 F3600              ; park nozzle at rear (700 전용 좌표)  오른쪽 뒤
    TURN_OFF_HEATERS                ; 히터랑 베드 한방에 끄고 전기 아끼기! ㅋㅋㅋ
   # M104 S0                         ; 핫엔드 끄기   (사용안함)
   # M140 S0                         ; 베드 끄기     (사용안함)
    BED_MESH_CLEAR
    STATUS_READY
    TIMELAPSE_RENDER            
    TEMPERATURE_WAIT SENSOR=extruder MAXIMUM=50 
    TIMELAPSE_RENDER
    M106 S0                         ; turn off fan 
    STATUS_OFF
    M84 XYE                         ; Z를 제외한 모든 스테퍼 비활성화
    M118 "퇴근 준비 완료!"             ; 화면에 메시지 띄우기
    M81                             ; ATX Power Off (라즈베리 파이 GPIO 연동 릴레이 OFF)
       

