[include CLIENT_VARIABLE.cfg]
[include SB_Combo_V2.cfg]
[include mainsail.cfg]
[include stealthburner_leds.cfg]   ######## 툴헤드 rgb조명 효과    sb_led   ########
[include led_effects.cfg]
[include macro.cfg]
[include power.cfg]
[include testspeed.cfg]
[include timelapse.cfg]
[include fan.cfg]
