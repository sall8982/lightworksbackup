#####################################################################
#   PRINTER
#####################################################################
[printer]
kinematics: corexy
max_velocity: 235            # 오타 수정 완료! (250 탈조 회피 구간)
max_accel: 10000             # 30,000 검증 완료 후 안전 마진 확보
max_z_velocity: 30           # 무난함
max_z_accel: 200             # 무난함
minimum_cruise_ratio: 0.65   # 최신 클리퍼 권장
square_corner_velocity: 12.0  # 정밀한 모서리 출력용


