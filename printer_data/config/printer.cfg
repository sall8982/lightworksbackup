#####################################################################
#   PRINTER
##  MCU for X/Y/E steppers main MCU
##  [X in X] - B Motor
##  [Y in Y] - A Motor
##  [E in E0] - Extruder
#####################################################################
[printer]
kinematics: corexy
max_velocity: 300   #기존 300
max_accel: 13000          # 인풋쉐이퍼 계산값 에서 조금 낮게설정 2025년11월07일
square_corner_velocity: 5.0
#max_z_velocity: 5      #기존 5  #Max 15 for 12V TMC Drivers, can increase for 24V
#max_z_accel: 40        #기존 20  
max_z_velocity: 5      # ai 추천 for 24V
max_z_accel: 25        # ai 추천 for 24V


